name: CI Pipeline

# Se ejecuta en PRs (flujo ideal) y push a main (red de seguridad)
on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main] # Red de seguridad por si alguien hace push directo

env:
  GO_VERSION: "1.25"

jobs:
  # ============================================================================
  # Tests unitarios — todos los módulos en paralelo
  # ============================================================================
  test:
    name: Test ${{ matrix.module }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - common
          - logger
          - config
          - testing
          - messaging/events
          - screenconfig
          - audit
          - auth
          - lifecycle
          - middleware/gin
          - database/postgres
          - database/mongodb
          - messaging/rabbit
          - bootstrap

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - name: Verificar formato
        working-directory: ${{ matrix.module }}
        run: |
          if ! gofmt -l . | grep -q .; then
            echo "✓ Código formateado correctamente"
          else
            echo "✗ Código no está formateado:"
            gofmt -l .
            exit 1
          fi

      - name: Descargar dependencias
        working-directory: ${{ matrix.module }}
        run: go mod download

      - name: Análisis estático (go vet)
        working-directory: ${{ matrix.module }}
        run: go vet ./...

      - name: Ejecutar tests con race detection
        working-directory: ${{ matrix.module }}
        run: go test -short -v -race ./...

      - name: Verificar build
        working-directory: ${{ matrix.module }}
        run: go build -v ./...

  # ============================================================================
  # Lint — todos los módulos en paralelo
  # ============================================================================
  lint:
    name: Lint ${{ matrix.module }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - common
          - logger
          - config
          - testing
          - messaging/events
          - screenconfig
          - audit
          - auth
          - lifecycle
          - middleware/gin
          - database/postgres
          - database/mongodb
          - messaging/rabbit
          - bootstrap

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - name: Descargar dependencias
        working-directory: ${{ matrix.module }}
        run: go mod download

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.4.0
          working-directory: ${{ matrix.module }}
          args: --timeout=5m

  # ============================================================================
  # Tests de integración — módulos con Docker/TestContainers en paralelo
  # ubuntu-latest incluye Docker, compatible con testcontainers-go
  # ============================================================================
  integration:
    name: Integration ${{ matrix.module }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - testing
          - database/postgres
          - database/mongodb
          - messaging/rabbit
          - bootstrap

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - name: Descargar dependencias
        working-directory: ${{ matrix.module }}
        run: go mod download

      - name: Ejecutar tests de integración
        working-directory: ${{ matrix.module }}
        env:
          INTEGRATION_TESTS: "true"
        run: go test -v -cover -timeout 10m ./...
