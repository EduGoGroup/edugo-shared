name: CI Pipeline

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main]

env:
  GO_VERSION: '1.25'

jobs:
  prepare-modules:
    name: Prepare Module Matrix
    runs-on: ubuntu-latest
    outputs:
      all: ${{ steps.modules.outputs.all }}
      integration: ${{ steps.modules.outputs.integration }}
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Exportar modulos
        id: modules
        run: |
          echo "all=$(./scripts/list-modules.sh --set all --format json)" >> "$GITHUB_OUTPUT"
          echo "integration=$(./scripts/list-modules.sh --set integration --format json)" >> "$GITHUB_OUTPUT"

  test:
    name: Test ${{ matrix.module }}
    runs-on: ubuntu-latest
    needs: prepare-modules
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.prepare-modules.outputs.all) }}

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - name: Verificar formato
        working-directory: ${{ matrix.module }}
        run: |
          if ! gofmt -l . | grep -q .; then
            echo "Codigo formateado correctamente"
          else
            echo "Codigo no esta formateado:"
            gofmt -l .
            exit 1
          fi

      - name: Descargar dependencias
        working-directory: ${{ matrix.module }}
        run: go mod download

      - name: Analisis estatico (go vet)
        working-directory: ${{ matrix.module }}
        run: go vet ./...

      - name: Ejecutar tests con race detection
        working-directory: ${{ matrix.module }}
        run: go test -short -v -race ./...

      - name: Verificar build
        working-directory: ${{ matrix.module }}
        run: go build -v ./...

  lint:
    name: Lint ${{ matrix.module }}
    runs-on: ubuntu-latest
    needs: prepare-modules
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.prepare-modules.outputs.all) }}

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - name: Descargar dependencias
        working-directory: ${{ matrix.module }}
        run: go mod download

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.4.0
          working-directory: ${{ matrix.module }}
          args: --timeout=5m

  integration:
    name: Integration ${{ matrix.module }}
    runs-on: ubuntu-latest
    needs: prepare-modules
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.prepare-modules.outputs.integration) }}

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - name: Descargar dependencias
        working-directory: ${{ matrix.module }}
        run: go mod download

      - name: Ejecutar tests de integracion
        working-directory: ${{ matrix.module }}
        env:
          INTEGRATION_TESTS: 'true'
        run: go test -v -cover -timeout 10m ./...
