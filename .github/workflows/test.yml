name: Tests with Coverage

on:
  workflow_dispatch:
  pull_request:
    branches: [main, dev]

jobs:
  prepare-modules:
    name: Prepare Coverage Matrix
    runs-on: ubuntu-latest
    outputs:
      all: ${{ steps.modules.outputs.all }}
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Exportar modulos
        id: modules
        run: echo "all=$(./scripts/list-modules.sh --set all --format json)" >> "$GITHUB_OUTPUT"

  test-coverage:
    name: Coverage ${{ matrix.module }}
    runs-on: ubuntu-latest
    needs: prepare-modules
    if: github.event_name != 'push'
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.prepare-modules.outputs.all) }}

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - name: Descargar dependencias
        working-directory: ${{ matrix.module }}
        run: go mod download

      - name: Ejecutar tests con cobertura
        working-directory: ${{ matrix.module }}
        run: |
          mkdir -p coverage
          go test -short -v -race -coverprofile=coverage/coverage.out -covermode=atomic ./...

          if [ -f coverage/coverage.out ]; then
            echo ""
            echo "Cobertura de ${{ matrix.module }}:"
            go tool cover -func=coverage/coverage.out | tail -1
          fi

      - name: Generar nombre de artifact sanitizado
        id: artifact_name
        run: |
          MODULE="${{ matrix.module }}"
          SANITIZED=$(echo "$MODULE" | tr '/' '-')
          echo "name=coverage-$SANITIZED" >> "$GITHUB_OUTPUT"

      - name: Subir reporte de cobertura
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ steps.artifact_name.outputs.name }}
          path: ${{ matrix.module }}/coverage/coverage.out
          retention-days: 30

      - name: Subir a Codecov
        uses: codecov/codecov-action@v5
        if: success()
        with:
          file: ${{ matrix.module }}/coverage/coverage.out
          flags: ${{ matrix.module }}
          fail_ci_if_error: false

  coverage-summary:
    name: Coverage Summary
    runs-on: ubuntu-latest
    needs: test-coverage
    if: always()

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'

      - name: Download all coverage artifacts
        uses: actions/download-artifact@v4
        with:
          path: coverage-artifacts

      - name: Generate summary
        run: |
          echo "# Resumen de Cobertura por Modulo" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Modulo | Cobertura |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-----------|" >> "$GITHUB_STEP_SUMMARY"

          for dir in coverage-artifacts/coverage-*/; do
            if [ -d "$dir" ] && [ -f "$dir/coverage.out" ]; then
              module=$(basename "$dir" | sed 's/coverage-//')
              coverage=$(go tool cover -func="$dir/coverage.out" | tail -1 | awk '{print $NF}')
              echo "| $module | $coverage |" >> "$GITHUB_STEP_SUMMARY"
            fi
          done
